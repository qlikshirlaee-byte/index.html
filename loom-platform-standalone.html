  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

t-family:'Jost',sans-serif; width:100%; overflow-x:hidden;\">\n\n  <!-- NAV -->\n  <div style=\"position:sticky; top:0; z-index:50; display:flex; align-items:center; justify-content:space-between; padding:24px 5vw; background:rgba(247,241,231,0.94); backdrop-filter:blur(6px); border-bottom:1px solid rgba(42,35,32,0.1);\">\n    <div style=\"font-family:'Cormorant Garamond',serif; font-size:24px; letter-spacing:0.02em; font-weight:500;\"><a href=\"loom-standalone.html\" style=\"color:#2a2320; text-decoration:none;\">Loom<\u002Fa><\u002Fdiv>\n    <div style=\"display:flex; gap:34px; align-items:center;\">\n      <a href=\"loom-platform-standalone.html\" style=\"color:#7a2b2e; text-decoration:none; font-size:13px; letter-spacing:0.06em; text-transform:uppercase;\">Platform<\u002Fa>\n      <a href=\"loom-standalone.html#pillars\" style=\"color:#2a2320; text-decoration:none; font-size:13px; letter-spacing:0.06em; text-transform:uppercase;\" style-hover=\"color:#7a2b2e;\">Solutions<\u002Fa>\n      <a href=\"loom-standalone.html#pricing\" style=\"color:#2a2320; text-decoration:none; font-size:13px; letter-spacing:0.06em; text-transform:uppercase;\" style-hover=\"color:#7a2b2e;\">Pricing<\u002Fa>\n      <a href=\"#\" style=\"color:#2a2320; text-decoration:none; font-size:13px; letter-spacing:0.06em; text-transform:uppercase;\" style-hover=\"color:#7a2b2e;\">Log In<\u002Fa>\n      <a href=\"#\" style=\"background:#7a2b2e; color:#f7f1e7; text-decoration:none; font-size:12px; letter-spacing:0.08em; text-transform:uppercase; padding:11px 24px;\" style-hover=\"background:#5f2022;\">Get Started<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- HERO -->\n  <section style=\"padding:100px 8vw 80px; text-align:center; max-width:940px; margin:0 auto;\">\n    <div style=\"font-size:12px; letter-spacing:0.3em; text-transform:uppercase; color:#7a2b2e; margin-bottom:24px;\">The Platform<\u002Fdiv>\n    <h1 style=\"font-family:'Cormorant Garamond',serif; font-weight:400; font-size:clamp(38px,5.4vw,66px); line-height:1.1; margin:0 0 26px;\">Everything your practice runs on, in one place.<\u002Fh1>\n    <p style=\"font-size:16.5px; line-height:1.7; color:#4a3f38; max-width:600px; margin:0 auto;\">Loom organizes clients, projects, inventory and billing into one connected system — so every relationship, booking and invoice stays in sync.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- MODULE NAV -->\n  <section style=\"padding:0 8vw 40px; display:flex; justify-content:center; gap:14px; flex-wrap:wrap;\">\n    <sc-for list=\"{{ modules }}\" as=\"m\" hint-placeholder-count=\"5\">\n      <a href=\"{{ m.anchor }}\" style=\"border:1px solid rgba(42,35,32,0.2); color:#2a2320; text-decoration:none; font-size:13px; letter-spacing:0.04em; padding:10px 22px;\" style-hover=\"border-color:#7a2b2e; color:#7a2b2e;\">{{ m.title }}<\u002Fa>\n    <\u002Fsc-for>\n  <\u002Fsection>\n\n  <!-- MODULE SECTIONS -->\n  <sc-for list=\"{{ modules }}\" as=\"m\" hint-placeholder-count=\"5\">\n    <section id=\"{{ m.id }}\" style=\"padding:90px 8vw; display:grid; grid-template-columns:1fr 1fr; gap:70px; align-items:center; background:{{ m.bg }}; border-top:1px solid rgba(42,35,32,0.1);\">\n      <div style=\"order:{{ m.imgOrder }};\">\n        <div style=\"font-family:'Cormorant Garamond',serif; font-size:15px; color:#c99a4a; margin-bottom:18px;\">{{ m.num }}<\u002Fdiv>\n        <h2 style=\"font-family:'Cormorant Garamond',serif; font-weight:400; font-size:clamp(28px,3.6vw,44px); margin:0 0 22px;\">{{ m.title }}<\u002Fh2>\n        <p style=\"font-size:15.5px; line-height:1.8; color:#4a3f38; margin:0 0 26px; max-width:460px;\">{{ m.desc }}<\u002Fp>\n        <ul style=\"list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:13px;\">\n          <sc-for list=\"{{ m.points }}\" as=\"pt\" hint-placeholder-count=\"4\">\n            <li style=\"font-size:14.5px; color:#2a2320; display:flex; gap:10px; align-items:baseline;\"><span style=\"color:#c99a4a;\">—<\u002Fspan>{{ pt }}<\u002Fli>\n          <\u002Fsc-for>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div style=\"height:440px; order:{{ m.imgOrder2 }};\">\n        <image-slot id=\"{{ m.imgId }}\" shape=\"rect\" fit=\"cover\" placeholder=\"{{ m.title }} screenshot\"><\u002Fimage-slot>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fsc-for>\n\n  <!-- INTEGRATIONS -->\n  <section style=\"padding:100px 8vw; text-align:center; background:#2a2320; color:#f7f1e7;\">\n    <div style=\"font-size:12px; letter-spacing:0.3em; text-transform:uppercase; color:#e3b975; margin-bottom:24px;\">Works With Your Stack<\u002Fdiv>\n    <h2 style=\"font-family:'Cormorant Garamond',serif; font-weight:400; font-size:clamp(30px,3.8vw,46px); margin:0 0 50px;\">Connects to the tools you already use.<\u002Fh2>\n    <div style=\"display:flex; justify-content:center; gap:60px; flex-wrap:wrap; opacity:0.85;\">\n      <sc-for list=\"{{ integrations }}\" as=\"i\" hint-placeholder-count=\"5\">\n        <div style=\"font-family:'Cormorant Garamond',serif; font-size:20px;\">{{ i.name }}<\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CTA -->\n  <section style=\"padding:130px 8vw; text-align:center; background:#efe3d0;\">\n    <div style=\"font-size:12px; letter-spacing:0.3em; text-transform:uppercase; color:#7a2b2e; margin-bottom:24px;\">Ready When You Are<\u002Fdiv>\n    <h2 style=\"font-family:'Cormorant Garamond',serif; font-weight:400; font-size:clamp(32px,4.4vw,54px); margin:0 0 36px;\">See Loom running your practice.<\u002Fh2>\n    <a href=\"#\" style=\"display:inline-block; background:#7a2b2e; color:#f7f1e7; text-decoration:none; font-size:13px; letter-spacing:0.1em; text-transform:uppercase; padding:18px 44px;\" style-hover=\"background:#5f2022;\">Start Free Trial<\u002Fa>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"padding:60px 8vw; display:flex; justify-content:space-between; align-items:center; border-top:1px solid rgba(42,35,32,0.15); font-size:13px; color:#6b5e54;\">\n    <div style=\"font-family:'Cormorant Garamond',serif; font-size:20px; color:#2a2320;\">Loom<\u002Fdiv>\n    <div>hello@useloom.com<\u002Fdiv>\n    <div>© 2026<\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      modules: [\n        { id:'clients', anchor:'#clients', num:'01', title:'Clients', desc:'A living record of every relationship — preferences, sizing, history and every conversation, always current.', points:['Full client profiles & history','Preferences and sizing on file','Direct messaging & communications','Shared notes across your team','Client self-service portal'], imgId:'mod-clients', imgOrder:1, imgOrder2:2, bg:'#f7f1e7' },\n        { id:'projects', anchor:'#projects', num:'02', title:'Projects & Booking', desc:'One calendar for every fitting, consult and event — across every location your practice runs in.', points:['Unified booking calendar across all locations','Project stages from intake to delivery','Assign each project to a studio, client site, or venue','Location-level availability & scheduling rules','Automated client reminders','Conflict & double-booking prevention'], imgId:'mod-projects', imgOrder:2, imgOrder2:1, bg:'#efe3d0' },\n        { id:'inventory', anchor:'#inventory', num:'03', title:'Inventory & Vendors', desc:'Track every piece and every vendor relationship from sourcing through return.', points:['Vendor directory & order tracking','Piece-level status and current location','Purchase orders & sourcing history','Low-stock and return alerts','Vendor performance and reliability notes'], imgId:'mod-inventory', imgOrder:1, imgOrder2:2, bg:'#f7f1e7' },\n        { id:'billing', anchor:'#billing', num:'04', title:'Billing', desc:'Merchant services, accounting and bookkeeping tied directly to the project and client they belong to.', points:['Integrated merchant services for payments','Project-linked invoicing','Automatic bookkeeping & reconciliation','Accounting-ready reports and exports','Recurring and installment billing','Automatic payment tracking & alerts'], imgId:'mod-billing', imgOrder:2, imgOrder2:1, bg:'#efe3d0' },\n        { id:'staff', anchor:'#staff', num:'05', title:'Staff & Access', desc:'Bring on stylists, assistants and managers with permissions scoped to their role, clients and locations.', points:['Role-based managerial access','Per-location and per-client permissions','Staff onboarding & offboarding','Activity and assignment tracking','Custom access levels per team member','Approval workflows for sensitive actions'], imgId:'mod-staff', imgOrder:1, imgOrder2:2, bg:'#f7f1e7' },\n      ],\n      integrations: [{name:'Google Calendar'},{name:'QuickBooks'},{name:'Stripe'},{name:'Gmail'},{name:'Dropbox'}],\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
