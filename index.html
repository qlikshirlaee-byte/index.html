    // its OWN frames — from local text at the root, or text obtained from

    // navigation stays same-origin with its initiator and a deduped page

    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends

    // an origin exists), and both directions are origin-gated (on https

    // opaque contexts — file:// — everything serializes as 'null', where

    // deny-by-default: one request form, one reply form, no error

    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document

      // and sender identity (own child frame / direct parent) is checked
      // separately.

    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.

    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down

      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;

    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }

        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'

        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;

    setStatus('Unpacking ' + uuids.length + ' assets...');

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {

    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';

    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);

      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

a2320; font-family:'Jost',sans-serif; width:100%; overflow-x:hidden;\">\n\n  <!-- NAV -->\n  <div style=\"position:sticky; top:0; z-index:50; display:flex; align-items:center; justify-content:space-between; padding:24px 5vw; background:rgba(247,241,231,0.94); backdrop-filter:blur(6px); border-bottom:1px solid rgba(42,35,32,0.1);\">\n    <div style=\"font-family:'Cormorant Garamond',serif; font-size:24px; letter-spacing:0.02em; font-weight:500;\">Loom<\u002Fdiv>\n    <div style=\"display:flex; gap:34px; align-items:center;\">\n      <a href=\"loom-platform-standalone.html\" style=\"color:#2a2320; text-decoration:none; font-size:13px; letter-spacing:0.06em; text-transform:uppercase;\" style-hover=\"color:#7a2b2e;\">Platform<\u002Fa>\n      <a href=\"#pillars\" style=\"color:#2a2320; text-decoration:none; font-size:13px; letter-spacing:0.06em; text-transform:uppercase;\" style-hover=\"color:#7a2b2e;\">Solutions<\u002Fa>\n      <a href=\"pricing.html\" style=\"color:#2a2320; text-decoration:none; font-size:13px; letter-spacing:0.06em; text-transform:uppercase;\" style-hover=\"color:#7a2b2e;\">Pricing<\u002Fa>\n      <a href=\"app.html\" style=\"color:#2a2320; text-decoration:none; font-size:13px; letter-spacing:0.06em; text-transform:uppercase;\" style-hover=\"color:#7a2b2e;\">Marketplace<\u002Fa>\n      <a href=\"app.html\" style=\"color:#2a2320; text-decoration:none; font-size:13px; letter-spacing:0.06em; text-transform:uppercase;\" style-hover=\"color:#7a2b2e;\">Log In<\u002Fa>\n      <a href=\"app.html\" style=\"background:#7a2b2e; color:#f7f1e7; text-decoration:none; font-size:12px; letter-spacing:0.08em; text-transform:uppercase; padding:11px 24px;\" style-hover=\"background:#5f2022;\">Get Started<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- HERO -->\n  <section style=\"padding:110px 8vw 90px; text-align:center; max-width:1000px; margin:0 auto;\">\n    <div style=\"font-size:12px; letter-spacing:0.3em; text-transform:uppercase; color:#7a2b2e; margin-bottom:26px;\">Business Management for Creative Practices<\u002Fdiv>\n    <h1 style=\"font-family:'Cormorant Garamond',serif; font-weight:400; font-size:clamp(42px,6vw,76px); line-height:1.08; margin:0 0 28px;\">One studio.<br>Every client, project, and vendor — <em style=\"font-style:italic; color:#7a2b2e;\">woven together.<\u002Fem><\u002Fh1>\n    <p style=\"font-size:17px; line-height:1.7; color:#4a3f38; max-width:600px; margin:0 auto 40px;\">Loom brings clients, bookings, inventory, vendors and billing into a single practice — built for stylists, designers, and independent creative studios running multiple relationships at once.<\u002Fp>\n    <div style=\"display:flex; gap:18px; justify-content:center;\">\n      <a href=\"app.html\" style=\"background:#7a2b2e; color:#f7f1e7; text-decoration:none; font-size:13px; letter-spacing:0.08em; text-transform:uppercase; padding:16px 34px;\" style-hover=\"background:#5f2022;\">Enter the Marketplace<\u002Fa>\n      <a href=\"loom-platform-standalone.html\" style=\"border:1px solid rgba(42,35,32,0.3); color:#2a2320; text-decoration:none; font-size:13px; letter-spacing:0.08em; text-transform:uppercase; padding:16px 34px;\" style-hover=\"border-color:#2a2320;\">See the Platform<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PRODUCT SHOT -->\n  <section style=\"padding:0 8vw 100px; max-width:1200px; margin:0 auto;\">\n    <div style=\"height:560px; border-radius:2px; overflow:hidden; box-shadow:0 40px 90px -30px rgba(42,35,32,0.35);\">\n      <img src=\"614d0786-131a-47b0-94e9-d65aeaccefca\" alt=\"Loom dashboard\" style=\"width:100%; height:100%; object-fit:cover; object-position:top;\">\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- TRUST BAR -->\n  <section style=\"padding:0 8vw 100px;\">\n    <div style=\"text-align:center; font-size:12px; letter-spacing:0.2em; text-transform:uppercase; color:#8a7b6e; margin-bottom:36px;\">Trusted by independent practices across styling, design &amp; events<\u002Fdiv>\n    <div style=\"display:flex; justify-content:center; gap:70px; flex-wrap:wrap; opacity:0.7;\">\n      <sc-for list=\"{{ trustLogos }}\" as=\"logo\" hint-placeholder-count=\"5\">\n        <div style=\"font-family:'Cormorant Garamond',serif; font-size:22px; color:#4a3f38;\">{{ logo.name }}<\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PILLARS -->\n  <section id=\"pillars\" style=\"padding:60px 8vw 100px;\">\n    <div style=\"text-align:center; max-width:700px; margin:0 auto 70px;\">\n      <div style=\"font-size:12px; letter-spacing:0.3em; text-transform:uppercase; color:#7a2b2e; margin-bottom:22px;\">The Platform<\u002Fdiv>\n      <h2 style=\"font-family:'Cormorant Garamond',serif; font-weight:400; font-size:clamp(32px,4vw,48px); margin:0;\">Five modules. One practice.<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:repeat(5,1fr); gap:1px; background:rgba(42,35,32,0.15);\">\n      <sc-for list=\"{{ pillars }}\" as=\"p\" hint-placeholder-count=\"5\">\n        <div style=\"background:#f7f1e7; padding:44px 30px; display:flex; flex-direction:column; gap:16px; min-height:230px;\">\n          <div style=\"font-family:'Cormorant Garamond',serif; font-size:15px; color:#c99a4a;\">{{ p.num }}<\u002Fdiv>\n          <h3 style=\"font-family:'Cormorant Garamond',serif; font-weight:500; font-size:23px; margin:0;\">{{ p.title }}<\u002Fh3>\n          <p style=\"font-size:14px; line-height:1.65; color:#4a3f38; margin:0;\">{{ p.desc }}<\u002Fp>\n          <div style=\"display:flex; flex-wrap:wrap; gap:8px; margin-top:auto; padding-top:6px;\">\n            <sc-for list=\"{{ p.caps }}\" as=\"cap\" hint-placeholder-count=\"5\">\n              <span style=\"font-size:11px; letter-spacing:0.03em; color:#7a2b2e; border:1px solid rgba(122,43,46,0.3); padding:5px 10px; border-radius:2px;\">{{ cap }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FEATURE DEEP DIVES -->\n  <sc-for list=\"{{ features }}\" as=\"f\" hint-placeholder-count=\"3\">\n    <section style=\"padding:80px 8vw; display:grid; grid-template-columns:1fr 1fr; gap:70px; align-items:center; background:{{ f.bg }};\">\n      <div style=\"order:{{ f.imgOrder }};\">\n        <div style=\"font-size:12px; letter-spacing:0.25em; text-transform:uppercase; color:#7a2b2e; margin-bottom:20px;\">{{ f.eyebrow }}<\u002Fdiv>\n        <h3 style=\"font-family:'Cormorant Garamond',serif; font-weight:400; font-size:clamp(28px,3.4vw,42px); margin:0 0 22px;\">{{ f.title }}<\u002Fh3>\n        <p style=\"font-size:15.5px; line-height:1.8; color:#4a3f38; margin:0 0 24px; max-width:460px;\">{{ f.desc }}<\u002Fp>\n        <ul style=\"list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:12px;\">\n          <sc-for list=\"{{ f.points }}\" as=\"pt\" hint-placeholder-count=\"3\">\n            <li style=\"font-size:14.5px; color:#2a2320; display:flex; gap:10px; align-items:baseline;\"><span style=\"color:#c99a4a;\">—<\u002Fspan>{{ pt }}<\u002Fli>\n          <\u002Fsc-for>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div style=\"height:420px; order:{{ f.imgOrder2 }};\">\n        <img src=\"{{ f.img }}\" alt=\"{{ f.title }}\" style=\"width:100%; height:100%; object-fit:cover; object-position:top; display:block;\">\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fsc-for>\n\n  <!-- STATS -->\n  <section style=\"padding:100px 8vw; background:#2a2320; color:#f7f1e7;\">\n    <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:40px; max-width:1200px; margin:0 auto;\">\n      <sc-for list=\"{{ stats }}\" as=\"s\" hint-placeholder-count=\"4\">\n        <div style=\"text-align:center;\">\n          <div style=\"font-family:'Cormorant Garamond',serif; font-size:56px; color:#e3b975; margin-bottom:10px;\">{{ s.value }}<\u002Fdiv>\n          <div style=\"font-size:13px; letter-spacing:0.1em; text-transform:uppercase; color:#cbbdb0;\">{{ s.label }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- TESTIMONIAL -->\n  <section style=\"padding:130px 8vw; text-align:center; max-width:880px; margin:0 auto;\">\n    <div style=\"font-family:'Cormorant Garamond',serif; font-style:italic; font-size:clamp(24px,2.8vw,34px); line-height:1.55;\">\"I stopped losing track of who ordered what, from which vendor, for which client. Loom is the backbone of my studio now.\"<\u002Fdiv>\n    <div style=\"margin-top:26px; font-size:13px; letter-spacing:0.1em; text-transform:uppercase; color:#7a2b2e;\">— Independent Styling Practice<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CTA -->\n  <section id=\"pricing\" style=\"padding:130px 8vw; text-align:center; background:#efe3d0;\">\n    <div style=\"font-size:12px; letter-spacing:0.3em; text-transform:uppercase; color:#7a2b2e; margin-bottom:24px;\">Get Started<\u002Fdiv>\n    <h2 style=\"font-family:'Cormorant Garamond',serif; font-weight:400; font-size:clamp(34px,4.6vw,58px); margin:0 0 36px;\">Run your practice like a studio, not a spreadsheet.<\u002Fh2>\n    <a href=\"#\" style=\"display:inline-block; background:#7a2b2e; color:#f7f1e7; text-decoration:none; font-size:13px; letter-spacing:0.1em; text-transform:uppercase; padding:18px 44px;\" style-hover=\"background:#5f2022;\">Start Free Trial<\u002Fa>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"padding:60px 8vw; display:flex; justify-content:space-between; align-items:center; border-top:1px solid rgba(42,35,32,0.15); font-size:13px; color:#6b5e54;\">\n    <div style=\"font-family:'Cormorant Garamond',serif; font-size:20px; color:#2a2320;\">Loom<\u002Fdiv>\n    <div>hello@useloom.com<\u002Fdiv>\n    <div>© 2026<\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      trustLogos: [{name:'Atelier & Co.'},{name:'Studio Marigold'},{name:'The Fitting Room'},{name:'Vera Events'},{name:'North & Silk'}],\n      pillars: [\n        { num:'01', title:'Clients', desc:'A single record for every client relationship — history, preferences, and every booking in one place.', caps:['Client Profiles','Preference History','Communications','Shared Notes','Self-Service Portal'] },\n        { num:'02', title:'Projects & Booking', desc:'Schedule sessions, fittings and events across every client and location without double-booking your studio.', caps:['Unified Calendar','Multi-Location Scheduling','Project Stages','Automated Reminders','Availability Rules'] },\n        { num:'03', title:'Inventory & Vendors', desc:'Track pieces, sourcing and vendor relationships from intake to return.', caps:['Piece Tracking','Vendor Directory','Purchase Orders','Low-Stock Alerts','Return Management'] },\n        { num:'04', title:'Billing', desc:'Merchant-ready payments, accounting and bookkeeping, tied directly to the project they belong to.', caps:['Merchant Services','Invoicing','Bookkeeping & Reconciliation','Accounting Reports','Payment Tracking'] },\n        { num:'05', title:'Staff & Access', desc:'Bring on staff with managerial permissions scoped to their role, clients and locations.', caps:['Role-Based Access','Onboarding','Activity Tracking','Location Permissions','Task Assignment'] },\n      ],\n      features: [\n        { eyebrow:'Clients', title:'Every client relationship, always current.', desc:'Keep preferences, sizing, past looks and communication history in one profile — so nothing gets lost between projects.', points:['Client profiles with full history','Notes and preferences at a glance','Shared timeline across your team'], imgId:'feat-clients', img:'assets/screenshot-clients.png', imgOrder:1, imgOrder2:2, bg:'#f7f1e7' },\n        { eyebrow:'Projects & Booking', title:'A calendar that understands your studio — wherever it happens.', desc:'See every fitting, consult and event across all your clients and locations at once, and avoid the scheduling chaos of juggling them by hand.', points:['Unified booking calendar across all locations','Project stages from intake to delivery','Assign projects to a studio, client site, or venue','Automated client reminders'], imgId:'feat-booking', img:'assets/screenshot-projects.png', imgOrder:2, imgOrder2:1, bg:'#efe3d0' },\n        { eyebrow:'Inventory & Vendors', title:'Know where every piece is, always.', desc:'From sourcing to fitting to return, track inventory across vendors and clients without a spreadsheet in sight.', points:['Vendor directory & order tracking','Piece-level status and location','Low-stock and return alerts'], imgId:'feat-inventory', img:'assets/screenshot-inventory.png', imgOrder:1, imgOrder2:2, bg:'#f7f1e7' },\n        { eyebrow:'Billing', title:'Seamless billing, accounting and bookkeeping.', desc:'Accept payments directly through Loom with built-in merchant services, while every transaction reconciles automatically into your books.', points:['Integrated merchant services for payments','Automatic bookkeeping & reconciliation','Accounting-ready reports and exports','Project-linked invoicing'], imgId:'feat-billing', img:'assets/screenshot-billing.png', imgOrder:2, imgOrder2:1, bg:'#efe3d0' },\n        { eyebrow:'Staff & Access', title:'Grow your team without losing control.', desc:'Add stylists, assistants and managers with permissions scoped to exactly what they should see and touch.', points:['Role-based managerial access','Per-location and per-client permissions','Staff activity and assignment tracking'], imgId:'feat-staff', img:'assets/screenshot-staff.png', imgOrder:1, imgOrder2:2, bg:'#f7f1e7' },\n      ],\n      stats: [\n        { value:'4', label:'Modules, One Practice' },\n        { value:'0', label:'Spreadsheets Needed' },\n        { value:'100%', label:'Client History Retained' },\n        { value:'24/7', label:'Access, Any Device' },\n      ],\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
